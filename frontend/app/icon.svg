<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#4f46e5"/>
  <!-- Vault door body -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="6" fill="none" stroke="#fff" stroke-width="1.5"/>
  <!-- Cross handle -->
  <line x1="16" y1="10" x2="16" y2="22" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="16" x2="22" y2="16" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lock bolt -->
  <circle cx="16" cy="16" r="2" fill="#fff"/>
  <!-- Hinge -->
  <rect x="25" y="12" width="2.5" height="3" rx="1" fill="#a5b4fc"/>
  <rect x="25" y="17" width="2.5" height="3" rx="1" fill="#a5b4fc"/>
</svg>
