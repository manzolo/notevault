services:
  db:
    image: postgres:15-alpine
    container_name: notevault-db
    environment:
      POSTGRES_DB: notevault
      POSTGRES_USER: notevault
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notevault -d notevault"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"
    networks:
      - notevault_network

  redis:
    image: redis:7-alpine
    container_name: notevault-redis
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "6379:6379"
    networks:
      - notevault_network

  backend:
    build: ./backend
    container_name: notevault-backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://notevault:${DB_PASSWORD}@db:5432/notevault
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      MASTER_KEY: ${MASTER_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - notevault_network

  frontend:
    build: ./frontend
    container_name: notevault-frontend
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    networks:
      - notevault_network

networks:
  notevault_network:
    driver: bridge
