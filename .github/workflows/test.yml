name: Backend Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: notevault
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: notevault_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      # Both DATABASE_URL and TEST_DATABASE_URL point at the CI test DB.
      # DATABASE_URL is read at import time by connection.py; it never actually
      # connects because get_db is overridden in tests.
      DATABASE_URL: postgresql+asyncpg://notevault:testpass@localhost:5432/notevault_test
      TEST_DATABASE_URL: postgresql+asyncpg://notevault:testpass@localhost:5432/notevault_test
      REDIS_URL: redis://localhost:6379/0
      # changeme falls back to 8-byte key padded to 32 bytes — valid for AES-256-GCM
      SECRET_KEY: ci-secret-key-for-notevault-testing
      MASTER_KEY: changeme
      CORS_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest -v --tb=short
