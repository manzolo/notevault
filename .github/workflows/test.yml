name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: Backend pytest (97+ tests, no browser required)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: notevault
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: notevault_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://notevault:testpass@localhost:5432/notevault_test
      TEST_DATABASE_URL: postgresql+asyncpg://notevault:testpass@localhost:5432/notevault_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-for-notevault-testing
      MASTER_KEY: changeme
      CORS_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run backend tests (includes full-flow tests)
        working-directory: backend
        run: pytest -v --tb=short

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: Playwright E2E (full stack via docker compose)
# ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Run after backend tests pass
    needs: backend

    steps:
      - uses: actions/checkout@v4

      # ── Build and start the full stack ──────────────────────────────────
      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          DB_PASSWORD=testpass
          SECRET_KEY=ci-e2e-secret-key-12345678901234567890
          MASTER_KEY=changeme
          CORS_ORIGINS=http://localhost:3000
          REDIS_URL=redis://redis:6379/0
          DATABASE_URL=postgresql+asyncpg://notevault:testpass@db:5432/notevault
          TEST_DATABASE_URL=postgresql+asyncpg://notevault:testpass@db:5432/notevault_test
          NEXT_PUBLIC_API_URL=http://localhost:8000
          EOF

      - name: Build and start docker compose
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for frontend to be ready
        run: |
          timeout 120 bash -c '
            until curl -sf http://localhost:3000/en/login > /dev/null 2>&1; do
              echo "Waiting for frontend..."
              sleep 3
            done
          '

      - name: Wait for backend to be ready
        run: |
          timeout 60 bash -c '
            until curl -sf http://localhost:8000/health > /dev/null 2>&1 || \
                  curl -sf http://localhost:8000/api/auth/login -X POST \
                       -H "Content-Type: application/json" \
                       -d "{}" > /dev/null 2>&1; do
              echo "Waiting for backend..."
              sleep 3
            done
          '

      # ── Install Playwright on the runner ────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (includes @playwright/test)
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      # ── Run tests ────────────────────────────────────────────────────────
      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_API_URL: http://localhost:8000
        run: npx playwright test

      # ── Artifacts on failure ─────────────────────────────────────────────
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 7

      - name: Stop docker compose
        if: always()
        run: docker compose down -v
